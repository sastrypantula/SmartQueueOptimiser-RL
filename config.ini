# Smart Queue Optimizer Configuration
# Adjust these settings to customize the system

[QUEUE_ENVIRONMENT]
# Maximum customers that can be in queue at once
max_queue_size = 20

# Number of service counters
num_counters = 3

# Maximum steps per training episode
max_steps_episode = 500

# Service time range (minutes)
min_service_time = 2
max_service_time = 8

# Customer arrival rate
arrival_probability = 0.3

# Priority distribution (normal, high, urgent)
# Must sum to 1.0
normal_priority_prob = 0.7
high_priority_prob = 0.2
urgent_priority_prob = 0.1

[RL_TRAINING]
# Training algorithm: PPO or DQN
algorithm = PPO

# Total training timesteps
total_timesteps = 50000

# Learning rate
learning_rate = 0.0003

# PPO specific parameters
ppo_n_steps = 1024
ppo_batch_size = 32
ppo_n_epochs = 4
ppo_gamma = 0.99
ppo_gae_lambda = 0.95
ppo_clip_range = 0.2

# DQN specific parameters
dqn_exploration_fraction = 0.1
dqn_exploration_initial_eps = 1.0
dqn_exploration_final_eps = 0.05

[SIMULATION]
# Default simulation parameters
default_num_counters = 3
default_num_steps = 500
default_num_episodes = 5

[API_SERVER]
# FastAPI server settings
host = 0.0.0.0
port = 8000
debug = True

[FRONTEND]
# React frontend settings
frontend_port = 3000
api_base_url = http://localhost:8000

[MODELS]
# Model storage
model_directory = ./models
save_trained_models = True

[LOGGING]
# Logging configuration
log_level = INFO
log_file = ./logs/app.log
